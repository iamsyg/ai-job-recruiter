# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Acer Aspire 3"                    # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 8                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.13.5"                      # python --version
  os: "windows 11"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: false               # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 0               # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Claude"        # e.g. for architecture discussion, code review
  - "GitHub Copilot"  # e.g. for autocomplete
  - "ChatGPT"      # e.g. for debugging, refactoring
  # Other options: "ChatGPT", "Cursor", "Gemini", "Codeium", "Other", "None"

ai_usage_summary: |
  ChatGPT and Claude were used for architecture discussions, feature engineering,
  debugging, code review, refactoring, and deployment guidance. GitHub Copilot
  was used for code completion and productivity during development. No candidate
  data was sent to external LLMs during the ranking stage. The final ranking
  pipeline runs entirely offline without network access or external API calls.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  The ranking system uses a hybrid retrieval pipeline combining lexical search,
  semantic embeddings, and handcrafted feature engineering. BM25 first retrieves
  relevant candidates based on the job description. A BGE embedding model then
  performs semantic retrieval using cosine similarity. Retrieved candidates are
  reranked using weighted features including skills, career history, education,
  certifications, language proficiency, relocation preference, Redrob behavioral
  signals, qualifying signals, and disqualifying signals. The final score is a
  weighted combination of embedding similarity, BM25 relevance, and engineered
  feature scores, with deterministic candidate ID tie-breaking to ensure stable
  rankings. Candidate embeddings and behavioral features are precomputed offline
  to satisfy runtime constraints.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: false        # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
